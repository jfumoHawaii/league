name: Run R Script Daily

permissions:
  contents: write

on:
  workflow_dispatch:   # lets you run manually (for testing)
  schedule:
    - cron: "0 14 * * *"   # runs daily at 9 AM Ecuador (UTC-5)

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c("httr","jsonlite","ggplot2","plotly","htmlwidgets","reshape2"), repos="https://cloud.r-project.org")'

      - name: Run R script
        run: Rscript league.R

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: outputs
          path: |
            *.png
            *.html
            *_files/
            *.pdf
            leagueScores.csv


      - name: Backup previous leagueScores
        run: |
          mkdir -p backups
          if [ -f leagueScores.csv ]; then
            cp leagueScores.csv backups/leagueScores_$(date +%Y%m%d_%H%M%S).csv
          fi

      - name: Commit updated leagueScores
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          
          git add leagueScores.csv backups/ docs/

          git commit -m "Auto-update leagueScores $(date +%Y-%m-%d)" || echo "No changes to commit"
          
          git push

