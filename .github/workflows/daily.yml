name: Run R Script Daily

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: "0 11 * * *"   # 5 AM Galapagos (UTC-6)

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: z

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c("httr","jsonlite","ggplot2","plotly","htmlwidgets","reshape2"), repos="https://cloud.r-project.org")'

      # ✅ BACKUP CURRENT FILE FROM REPO BEFORE OVERWRITING
      - name: Backup previous leagueScores
        run: |
          mkdir -p backups
          if [ -f leagueScores.csv ]; then
            cp leagueScores.csv backups/leagueScores_$(date +%Y%m%d_%H%M%S).csv
          fi

      # ✅ RUN SCRIPT (this overwrites leagueScores.csv)
      - name: Run R script
        run: Rscript league.R

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: outputs
          path: |
            *.png
            *.html
            *_files/
            *.pdf
            leagueScores.csv

      # ✅ COMMIT NEW VERSION
      - name: Commit updated files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add leagueScores.csv backups/ docs/ || true

          git commit -m "Auto-update $(date +%Y-%m-%d)" || echo "No changes"

          git push
