name: Run R Script Daily

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: "0 11 * * *"   # 5 AM Galapagos (UTC-6)

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.3'

      # =========================
      # SYSTEM DEPENDENCIES
      # =========================
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev \
            libudunits2-dev \
            libgdal-dev \
            libgeos-dev \
            libproj-dev \
            pandoc

      # =========================
      # R PACKAGE INSTALL (FIXED ORDER)
      # =========================
      - name: Install R packages
        run: |
          Rscript -e 'options(repos = c(CRAN="https://cloud.r-project.org"))'

          # Core dependency system FIRST
          Rscript -e 'install.packages(c("fs","pkgload","sass","bslib"), dependencies=TRUE)'

          # HTML / reporting stack SECOND
          Rscript -e 'install.packages(c("rmarkdown","shiny","htmltools","htmlwidgets"), dependencies=TRUE)'

          # Plotting stack THIRD
          Rscript -e 'install.packages(c("ggplot2","plotly","reshape2","ggthemes"), dependencies=TRUE)'

          # Data / utilities
          Rscript -e 'install.packages(c("httr","jsonlite"), dependencies=TRUE)'

      # =========================
      # SAFETY CHECK
      # =========================
      - name: Test critical libraries
        run: |
          Rscript -e 'library(rmarkdown); library(htmlwidgets); library(plotly); cat("All core packages loaded\n")'

      # =========================
      # BACKUP
      # =========================
      - name: Backup previous leagueScores
        run: |
          mkdir -p backups
          if [ -f leagueScores.csv ]; then
            cp leagueScores.csv backups/leagueScores_$(date +%Y%m%d_%H%M%S).csv
          fi

      # =========================
      # RUN SCRIPT
      # =========================
      - name: Run R script
        run: Rscript league.R

      # =========================
      # ARTIFACTS
      # =========================
      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: outputs
          path: |
            *.png
            *.html
            *_files/
            *.pdf
            leagueScores.csv

      # =========================
      # COMMIT RESULTS
      # =========================
      - name: Commit updated files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add leagueScores.csv backups/ docs/ || true

          git commit -m "Auto-update $(date +%Y-%m-%d)" || echo "No changes"

          git push
