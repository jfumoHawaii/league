name: Run R Script Daily

on:
  workflow_dispatch:   # lets you run manually (for testing)
  schedule:
    - cron: "0 14 * * *"   # runs daily at 9 AM Ecuador (UTC-5)

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c("httr","jsonlite","ggplot2","plotly","htmlwidgets","reshape2"), repos="https://cloud.r-project.org")'

      - name: Run R script
        run: Rscript league.R

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: outputs
          path: |
            *.png
            *.html
            *.pdf
            leagueScores.csv
